name: 每月自动更新

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 1 * *'    # 每月 1 号 1 点 UTC

permissions:
  contents: write

jobs:
  # 检查当前北京时间是否在 2026-01-01 至 2027-12-31 之间
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 检查日期范围（北京时间）
        id: check
        run: |
          # 使用北京时间获取当前日期（格式 YYYYMMDD）
          BEIJING_DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)
          START=20260101
          END=20271231
          if [ "$BEIJING_DATE" -ge "$START" ] && [ "$BEIJING_DATE" -le "$END" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ 当前北京时间 $BEIJING_DATE 在有效范围内，将执行同步"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "⏭️ 当前北京时间 $BEIJING_DATE 不在有效范围内，跳过同步"
          fi
  sync-data:
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 清理旧的下载目录
        run: |
          rm -rf downloads
          mkdir -p downloads
          
      - name: 编译并运行 Java 程序下载数据
        run: |
          mvn clean install -pl pss-00-base -am
          mvn compile exec:java -pl pss-01-pss -Dexec.mainClass="crawl.Main" -Dexec.cleanupDaemonThreads=false
          
      - name: 整理数据并打包为 zip
        run: |
          cd downloads
          # 1. 使用 shell 变量定义日期和文件名
          DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)
          ZIP_NAME="合成数据_${DATE}.zip"
          # 2. 打包当前目录所有文件
          zip -r "../${ZIP_NAME}" *
          cd ..
          echo "打包完成，生成文件: $(ls -la ${ZIP_NAME})"
          # 3. 将变量写入 GITHUB_ENV，供后续步骤使用
          echo "DATE=${DATE}" >> $GITHUB_ENV
          echo "ZIP_FILE=${ZIP_NAME}" >> $GITHUB_ENV
          
      - name: 备份zip数据包到临时目录
        run: |
          rm -rf /tmp/pss-data-backup
          mkdir -p /tmp/pss-data-backup
          cp ${ZIP_FILE} /tmp/pss-data-backup/
          ls -la /tmp/pss-data-backup/
          echo "zip 包已备份"
          
      - name: 删除工作区的临时 zip 文件
        run: rm -f ${ZIP_FILE}

      - name: 切换到 data 分支（或创建）
        run: |
          git fetch origin data || true
          if git show-ref --verify --quiet refs/remotes/origin/data; then
            git checkout -B data origin/data
          else
            git checkout --orphan data
          fi
          git clean -fdx
          
      - name: 将 zip 包复制到工作区
        run: |
          cp /tmp/pss-data-backup/${ZIP_FILE} .
          ls -la
          
      - name: 更新 README 索引
        run: |
          if [ ! -f README.md ]; then
            echo "# Pss 合成数据仓库" > README.md
            echo "" >> README.md
            echo "此分支仅存储数据，每月1号自动从官网拉取一次最新的合成数据。" >> README.md
          fi
          echo "" >> README.md
          echo "## ${DATE} 更新" >> README.md
          echo "- 更新时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> README.md
      
      - name: 配置 Git 用户
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: 设置远程 URL 使用 GITHUB_TOKEN
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: 提交并推送到 data 分支
        run: |
          git add "${ZIP_FILE}" README.md
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "Add data for ${DATE}"
            git push origin data
            echo "✅ 数据已推送到 data 分支"
          fi
